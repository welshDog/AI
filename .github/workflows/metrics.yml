name: Metrics Dashboard Update

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC
  workflow_dispatch:

jobs:
  update-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests

      - name: Collect metrics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python dashboard/metrics.py --output dashboard/latest.json

      - name: Commit metrics update
        run: |
          git config user.name 'HyperGold Bot'
          git config user.email 'bot@hyperfocuszone.com'
          git add dashboard/latest.json
          git diff --staged --quiet || git commit -m '📊 Auto-update metrics dashboard'
          git push
